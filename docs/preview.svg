      <rect x="792" y="2" width="34" height="16" rx="4" fill="rgba(99,102,241,0.97)"/>
      <rect x="832" y="2" width="34" height="16" rx="4" fill="rgba(99,102,241,0.50)"/>
      <rect x="872" y="2" width="34" height="16" rx="4" fill="rgba(99,102,241,0.40)"/>
      <rect x="912" y="2" width="34" height="16" rx="4" fill="rgba(99,102,241,0.33)"/>
      <rect x="952" y="2" width="34" height="16" rx="4" fill="rgba(99,102,241,0.28)"/>
      <rect x="992" y="2" width="34" height="16" rx="4" fill="rgba(99,102,241,0.24)"/>
      <rect x="1032" y="2" width="34" height="16" rx="4" fill="rgba(99,102,241,0.21)"/>
    </g>
    <g transform="translate(0,518)">
      <text x="700" y="14" fill="#c3cad8" font-size="10">06-19</text>
      <rect x="792" y="2" width="34" height="16" rx="4" fill="rgba(99,102,241,0.97)"/>
      <rect x="832" y="2" width="34" height="16" rx="4" fill="rgba(99,102,241,0.42)"/>
      <rect x="872" y="2" width="34" height="16" rx="4" fill="rgba(99,102,241,0.34)"/>
      <rect x="912" y="2" width="34" height="16" rx="4" fill="rgba(99,102,241,0.29)"/>
      <rect x="952" y="2" width="34" height="16" rx="4" fill="rgba(99,102,241,0.25)"/>
      <rect x="992" y="2" width="34" height="16" rx="4" fill="rgba(99,102,241,0.22)"/>
      <rect x="1032" y="2" width="34" height="16" rx="4" fill="rgba(99,102,241,0.19)"/>
    </g>
    <g transform="translate(0,542)">
      <text x="700" y="14" fill="#c3cad8" font-size="10">06-26</text>
      <rect x="792" y="2" width="34" height="16" rx="4" fill="rgba(99,102,241,0.97)"/>
      <rect x="832" y="2" width="34" height="16" rx="4" fill="rgba(99,102,241,0.38)"/>
      <rect x="872" y="2" width="34" height="16" rx="4" fill="rgba(99,102,241,0.31)"/>
      <rect x="912" y="2" width="34" height="16" rx="4" fill="rgba(99,102,241,0.27)"/>
