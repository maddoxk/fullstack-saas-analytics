# Postgres for full-stack (server) mode.
#   docker compose up -d
#   npm run prisma:migrate   # create tables
#   npm run seed             # load ~43k realistic events
services:
  postgres:
    image: postgres:16-alpine
    container_name: insightly-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: analytics
      POSTGRES_PASSWORD: analytics
      POSTGRES_DB: analytics
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analytics"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
